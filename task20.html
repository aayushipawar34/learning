<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>task1</title>

    <style>
        *{
            padding: 0%;
            margin: 0%;
        }
       
        .container{
            width:100%;
            height: 100vh;
            background-color: antiquewhite;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .child1{
            width: 500px;
            height: 500px;
            border: 7px solid rgb(216, 222, 223);
             border-radius: 20px;
              background-color: rgb(206, 225, 225);
        }
        .child2{
            width: 500px;
            height: 500px;
            border: 7px solid rgb(216, 222, 223);
            justify-content: center;
            display: flex;
             margin-left: 20px;
             border-radius: 20px;
             background-color: azure;
        }
        form{
            margin: 50px;
        }
        .imgdiv{
            width: 300px;
            height: 400px;
            border: 1px solid rgb(13, 61, 174);
            justify-content: center;
            margin:50px;
            align-items: center;
            border-radius: 20px;
        }
        img{
            margin: 50px;
        }

        .btn1{
             height: 50px;
            width: 100px;
            border-radius: 10px;
            background-color: rgba(45, 11, 148, 0.552);
             color: white;
            font-size: medium;
            font-weight: bold;

        }
        .btn{
            height: 50px;
            width: 100px;
            border-radius: 10px;
            margin: 20px;
            background-color: rgba(45, 11, 148, 0.552);
             color: white;
            font-size: medium;
            font-weight: bold;
        }
        .btn:hover{
            background-color: brown;
        }
        .btn1:hover{
            background-color: brown;
        }
        .a{
             display: flex;
            justify-content: center;
            margin-bottom: 180px;
        }
         @media (min-width:30px){
            .container{
                background-color: blue;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="child1">
            <form action="">
             <h1>SignUp</h1>
            <label>Full Name:</label><br>
            <input type="text" placeholder="Enter your name"><br><br>

        <label>Email:</label><br>
        <input type="email" placeholder="Enter your email"><br><br>

        <label for="">Password</label><br>
        <input type="password" placeholder="Enter password"> <br><br>
        <button class="btn1">Submit</button>
            </form>
         
        </div>
        <div class="child2">
            <div class="imgdiv">
                <img src="./image/download.png" alt="">
                 <div class="a">
                     <button class="btn">Scan Here</button>
                </div>
            </div>
              
        </div>
    </div>
</body>
</html>
